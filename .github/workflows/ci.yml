name: Runtime Verification

on:
  push:
    branches:
      - main
  pull_request:

permissions:
  contents: read

jobs:
  verify-runtime:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install Dependencies
        run: npm ci

      - name: Verify Runtime
        run: bash scripts/verify-runtime.sh
