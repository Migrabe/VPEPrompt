services:
  - type: web
    name: vpe-master-wide
    env: node
    plan: free
    buildCommand: npm install
    startCommand: node server.js
    envVars:
      - key: NODE_VERSION
        value: 20
      - key: PORT
        value: 3000
      - key: GROQ_API_KEY
        sync: false # User should set this in Render dashboard
